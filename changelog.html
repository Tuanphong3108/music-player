<!DOCTYPE html>
<html lang="vi" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What's New?</title>
  
  <!-- Google Sans Flex Font -->
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@100..1000&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Áp dụng font Google Sans Flex và hiệu ứng mượt khi chuyển đổi màu sắc */
    body {
      font-family: 'Google Sans Flex', sans-serif;
      transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* Hiệu ứng chuyển màu mượt cho các phần tử con */
    .theme-transition {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* Tinh chỉnh thanh cuộn siêu thanh lịch */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(155, 155, 155, 0.2);
      border-radius: 99px;
    }
  </style>
</head>
<body class="h-full w-full flex flex-col p-4 justify-start select-none overflow-y-auto">

  <!-- CONTAINER CHÍNH -->
  <div class="w-full max-w-md mx-auto flex flex-col gap-3">
    
    <!-- PHẦN ĐẦU: TIÊU ĐỀ PHIÊN BẢN -->
    <header class="flex flex-col gap-1">
      <h1 id="app-title-version" class="text-lg font-black tracking-tight flex flex-wrap items-baseline gap-1.5 theme-transition">
        <!-- Nội dung Header sẽ được render động ở đây -->
      </h1>
    </header>

    <!-- PHẦN DƯỚI: DANH SÁCH CHANGELOG -->
    <main id="changelog-container" class="flex flex-col gap-2.5 pl-1">
      <!-- Các dòng cập nhật sẽ được render động ở đây -->
    </main>
    
  </div>

  <script>
// =========================================================================
// ⬇️ BRO PHONG THAY ĐỔI TOÀN BỘ NỘI DUNG & MÀU SẮC TẠI ĐÂY LÀ OK ⬇️
// =========================================================================
const EMBED_CONFIG = {
  appName: "Audio Player",
  version: "v2026.07.20",
  build: "build091043",

  // Mặc định ban đầu khi chưa nhận tin nhắn sẽ hiển thị theme này
  defaultTheme: "dark",

  // 🌌 DARK MODE
  darkTheme: {
    bg: "#0f111a",
    mainTextColor: "#ffffff",
    subTextColor: "rgba(255,255,255,0.8)",
    buildBadgeBg: "rgba(255,255,255,0.1)"
  },

  // ☀️ LIGHT MODE
  lightTheme: {
    bg: "#f8f9fa",
    mainTextColor: "#1a1a1a",
    subTextColor: "rgba(0,0,0,0.7)",
    buildBadgeBg: "rgba(0,0,0,0.05)"
  },

  changelogItems: [
    "🎵 Đổi tên ứng dụng từ Music Player thành Audio Player",
    "📝 Thêm Metadata Editor (Experimental)",
    "🖼️ Thêm Thumbnail Editor (Experimental)",
    "🎮 Bắt đầu tích hợp giao diện Minecraft Ore UI",
    "🎤 Hỗ trợ đọc Lyric Embed từ file nhạc",
    "🖥️ Thêm Full Screen Mode mới",
    "🎨 Thêm Accent Color (10 màu)",
    "⌨️ Thêm nhiều phím tắt mới",
    "📰 What's New đã đồng bộ theme của Audio Player",
    "🔊 Lưu lại trạng thái Shuffle/Repeat/Volume",
    "ℹ Thêm nút 'Thông tin khác'",
    "⚡ Cải thiện hiệu năng và sửa nhiều lỗi"
  ]
};
// =========================================================================
// ⬆️ HẾT PHẦN CẤU HÌNH CỦA BRO ⬆️
// =========================================================================

    // Biến lưu giữ theme hiện tại ("dark" hoặc "light")
    let currentTheme = EMBED_CONFIG.defaultTheme;

    /**
     * Hàm dùng để cập nhật màu sắc hiển thị dựa trên cấu hình màu tương ứng của theme
     */
    function applyThemeStyles(themeName) {
      currentTheme = themeName;
      const theme = themeName === "light" ? EMBED_CONFIG.lightTheme : EMBED_CONFIG.darkTheme;

      // 1. Áp dụng cho Body (Nền & Màu chữ mặc định)
      document.body.style.backgroundColor = theme.bg;
      document.body.style.color = theme.subTextColor;

      // 2. Áp dụng cho tên App
      const appNameSpan = document.getElementById('app-name-text');
      if (appNameSpan) {
        appNameSpan.style.color = theme.mainTextColor;
      }

      // 3. Áp dụng cho Nhãn Build (Build Badge)
      const buildBadge = document.getElementById('build-badge');
      if (buildBadge) {
        buildBadge.style.backgroundColor = theme.buildBadgeBg;
        buildBadge.style.color = theme.mainTextColor;
      }

      // 4. Áp dụng cho các dòng Changelog
      const items = document.querySelectorAll('.changelog-item');
      items.forEach(item => {
        item.style.color = theme.subTextColor;
      });
    }

    /**
     * Khởi tạo và kết xuất cấu trúc DOM tĩnh dựa trên cấu hình
     */
    function initEmbed() {
      const activeTheme = currentTheme === "light" ? EMBED_CONFIG.lightTheme : EMBED_CONFIG.darkTheme;

      // 1. Khởi tạo cấu trúc Tiêu đề & Phiên bản
      const headerTitle = document.getElementById('app-title-version');
      headerTitle.innerHTML = `
        <span id="app-name-text" class="theme-transition" style="color: ${activeTheme.mainTextColor}">${EMBED_CONFIG.appName}</span> 
        <span class="text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-fuchsia-400 font-bold">${EMBED_CONFIG.version}</span>
        <span id="build-badge" class="text-[10px] px-2 py-0.5 rounded-md font-mono theme-transition" 
              style="background-color: ${activeTheme.buildBadgeBg}; color: ${activeTheme.mainTextColor}; opacity: 0.85;">
          ${EMBED_CONFIG.build}
        </span>
      `;

      // 2. Khởi tạo danh sách Changelog
      const container = document.getElementById('changelog-container');
      container.innerHTML = ''; 

      EMBED_CONFIG.changelogItems.forEach(item => {
        const itemParagraph = document.createElement('p');
        itemParagraph.className = 'changelog-item text-sm leading-relaxed font-semibold theme-transition';
        itemParagraph.style.color = activeTheme.subTextColor;
        itemParagraph.innerText = item;
        container.appendChild(itemParagraph);
      });

      // 3. Thực thi áp dụng màu ban đầu
      applyThemeStyles(currentTheme);
    }

    // LẮNG NGHE SỰ KIỆN POSTMESSAGE TỪ TRANG CHA HOẶC IFRAME CONTAINER
    window.addEventListener('message', (event) => {
      // Nhận giá trị trực tiếp dạng String hoặc thông qua một Object { theme: "..." }
      const data = event.data;
      
      if (data === 'dark' || (data && data.theme === 'dark')) {
        applyThemeStyles('dark');
      } else if (data === 'light' || (data && data.theme === 'light')) {
        applyThemeStyles('light');
      }
    });

    // Thực thi render ngay khi tải trang xong
    window.onload = initEmbed;
  </script>
</body>
</html>
