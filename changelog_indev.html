<!DOCTYPE html>
<html lang="vi" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What's New?</title>
  
  <!-- Google Sans Flex Font -->
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@100..1000&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Áp dụng font Google Sans Flex và ép nền tối vĩnh viễn */
    body {
      font-family: 'Google Sans Flex', sans-serif;
      background-color: #0f111a; /* Nền tối siêu sang chống tàng hình */
    }
    
    /* Ẩn/Tinh chỉnh scrollbar cho mượt */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 99px;
    }
  </style>
</head>
<body class="h-full w-full flex flex-col p-4 justify-start select-none overflow-y-auto">

  <!-- CONTAINER CHÍNH -->
  <div class="w-full max-w-md mx-auto flex flex-col gap-3">
    
    <!-- PHẦN ĐẦU: TIÊU ĐỀ PHIÊN BẢN -->
    <header class="flex flex-col gap-1">
      <h1 id="app-title-version" class="text-lg font-black tracking-tight flex flex-wrap items-baseline gap-1.5">
        <!-- Render động -->
      </h1>
    </header>

    <!-- PHẦN DƯỚI: DANH SÁCH CHANGELOG -->
    <main id="changelog-container" class="flex flex-col gap-2.5 pl-1">
      <!-- Render động -->
    </main>
    
  </div>

  <script>
    // =========================================================================
    // ⬇️ BRO PHONG THAY ĐỔI TOÀN BỘ NỘI DUNG & MÀU SẮC TẠI ĐÂY LÀ OK ⬇️
    // =========================================================================
    const EMBED_CONFIG = {
      appName: "Music Player",
      version: "vindev",
      build: "buildindev",
      
      // CONFIG MÀU CHỮ TRÊN NỀN TỐI (Đã được tối ưu hoàn hảo)
      mainTextColor: "#ffffff",           // Màu chữ trắng tinh khôi cho tiêu đề chính
      subTextColor: "rgba(255,255,255,0.8)", // Màu chữ xám trắng nhẹ cho changelog dễ đọc
      buildBadgeBg: "rgba(255,255,255,0.1)", // Nền của tag build trông mờ ảo
      
      // Danh sách nội dung hiển thị bên dưới.
      changelogItems: [
        "- indev"
      ]
    };
    // =========================================================================
    // ⬆️ HẾT PHẦN CẤU HÌNH CỦA BRO ⬆️
    // =========================================================================

    function initEmbed() {
      // Áp dụng màu chữ chủ đạo từ cấu hình
      document.body.style.color = EMBED_CONFIG.subTextColor;

      // 1. Render Header
      const headerTitle = document.getElementById('app-title-version');
      headerTitle.style.color = EMBED_CONFIG.mainTextColor;
      headerTitle.innerHTML = `
        <span>${EMBED_CONFIG.appName}</span> 
        <span class="text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-fuchsia-400 font-bold">${EMBED_CONFIG.version}</span>
        <span class="text-[10px] px-2 py-0.5 rounded-md font-mono" style="background-color: ${EMBED_CONFIG.buildBadgeBg}; color: ${EMBED_CONFIG.mainTextColor}; opacity: 0.7;">${EMBED_CONFIG.build}</span>
      `;

      // 2. Render Changelog Items
      const container = document.getElementById('changelog-container');
      container.innerHTML = ''; // Xóa mẫu cũ

      EMBED_CONFIG.changelogItems.forEach(item => {
        const itemParagraph = document.createElement('p');
        itemParagraph.className = 'text-sm leading-relaxed font-semibold transition-all duration-200';
        itemParagraph.style.color = EMBED_CONFIG.subTextColor;
        itemParagraph.innerText = item;
        container.appendChild(itemParagraph);
      });
    }

    // Chạy render ngay khi load trang
    window.onload = initEmbed;
  </script>
</body>
</html>
